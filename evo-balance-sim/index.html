<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Sensor Fusion Showdown — Vishal Bagade</title>
  <style>
    body { background: #050810; color: #e2e8f0; font-family: 'Courier New', monospace; display: flex; gap: 20px; padding: 20px; }
    .panel { background: rgba(255,255,255,0.03); border: 1px solid #00d4ff33; padding: 20px; width: 350px; border-radius: 8px; }
    canvas { background: #000; border: 1px solid #00d4ff66; border-radius: 8px; }
    .legend { margin-top: 10px; font-size: 0.8rem; }
    .k { color: #00ff00; } .c { color: #00d4ff; } .p { color: #ff00ff; } .t { color: #ffffff; }
    select, button { width: 100%; padding: 10px; margin-top: 10px; background: #111; color: #00d4ff; border: 1px solid #00d4ff; cursor: pointer; }
    input[type=range] { width: 100%; accent-color: #00d4ff; }
  </style>
</head>
<body>

  <div class="panel">
    <h2 style="color:#00d4ff; font-size: 1.1rem; letter-spacing: 2px;">SENSOR FUSION SHOWDOWN</h2>
    
    <label>Active Feedback Filter:</label>
    <select id="activeFilter">
      <option value="kalman">Kalman Filter (Optimal)</option>
      <option value="comp">Complementary (Hobbyist)</option>
      <option value="bayes">Particle Filter (Monte Carlo)</option>
    </select>

    <div class="legend">
      <div class="t">■ True Position (Physical Reality)</div>
      <div class="k">■ Kalman Estimate (Math/Probabilistic)</div>
      <div class="c">■ Complementary Estimate (Weighted)</div>
      <div class="p">■ Particle Swarm (Stochastic)</div>
    </div>

    <label style="display:block; margin-top:20px;">Gyro Noise: <span id="v-gyro">0.005</span></label>
    <input type="range" id="gyro_noise" min="0" max="0.05" step="0.001" value="0.005">

    <label>Accel Noise: <span id="v-accel">0.01</span></label>
    <input type="range" id="accel_noise" min="0" max="0.1" step="0.001" value="0.01">

    <button onclick="location.reload()">Reset System</button>

      <div id="telemetry" style="margin-bottom:15px; font-size: 0.85rem; border-bottom:1px solid #333; padding-bottom:10px;">
   <div style="display:flex; justify-content:space-between;">
     <span>Kalman Error:</span> <span id="err-k" class="k">0.0000</span>
   </div>
   <div style="display:flex; justify-content:space-between;">
     <span>Comp Filter Error:</span> <span id="err-c" class="c">0.0000</span>
   </div>
   <div style="display:flex; justify-content:space-between;">
     <span>Particle Error:</span> <span id="err-p" class="p">0.0000</span>
   </div>
</div>
    <div class="panel">
  <div style="margin-top:20px; border-top:1px solid #333; padding-top:10px;">
    <button id="btn-record" style="background: #ef4444; color: white;">⏺ Start Mission Log</button>
    <button id="btn-download" style="background: #10b981; color: white; display: none; margin-top: 5px;">⬇ Export CSV</button>
    
    <div id="log-terminal" style="background: #000; color: #10b981; font-size: 0.7rem; height: 150px; overflow-y: scroll; margin-top: 10px; padding: 5px; border: 1px solid #111;">
      > System Standby...
    </div>
  </div>
</div>
  </div>

  <canvas id="simCanvas" width="600" height="600"></canvas>

  <script src="cpp_src/kalman.js"></script>
  <script src="cpp_src/comp.js"></script>
  <script src="cpp_src/bayes.js"></script>

  <script>

    // Logging State
let isRecording = false;
let missionData = [];
let frameCount = 0;
const terminal = document.getElementById('log-terminal');

function log(msg) {
    terminal.innerHTML += `> ${msg}<br>`;
    terminal.scrollTop = terminal.scrollHeight;
}

document.getElementById('btn-record').onclick = (e) => {
    isRecording = !isRecording;
    if (isRecording) {
        missionData = [["Time", "True_Theta", "Kalman_Est", "Comp_Est", "Particle_Est", "Torque"]];
        e.target.innerText = "⏹ Stop & Save";
        log("Recording high-speed telemetry...");
    } else {
        e.target.innerText = "⏺ Start Mission Log";
        document.getElementById('btn-download').style.display = "block";
        log(`Captured ${missionData.length} samples.`);
    }
};

document.getElementById('btn-download').onclick = () => {
    const csv = missionData.map(row => row.join(",")).join("\n");
    const blob = new Blob([csv], { type: 'text/csv' });
    const url = window.URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = `fusion_showdown_${Date.now()}.csv`;
    a.click();
};
    
    let K, C, B;
    const canvas = document.getElementById('simCanvas');
    const ctx = canvas.getContext('2d');
    
    // Physics State (The Ground Truth)
    let theta = 1.0, omega = 0.0, dt = 0.016;
    let est_k = 1.0, est_c = 1.0, est_b = 1.0;
    
    // Config for Subdirectory Loading
    const wasmConfig = { locateFile: (path) => `cpp_src/${path}` };

    // Boot the System
    Promise.all([
      KalmanModule(wasmConfig),
      CompModule(wasmConfig),
      BayesModule(wasmConfig)
    ]).then(modules => {
      [K, C, B] = modules;
      log("All WASM Filters Online. Loop starting...");
      requestAnimationFrame(loop);
    });

    // --- REALISTIC PHYSICAL CONSTANTS ---
    const g = 9.81;      // Gravity (m/s^2)
    const L = 0.5;       // Length of the rod (m)
    const m = 0.2;       // Mass of the weight (kg)
    const J = m * L * L; // Moment of Inertia
    const b = 0.01;      // Friction/Damping coefficient

    function loop() {
      // 1. Get UI Inputs
      const g_noise = parseFloat(document.getElementById('gyro_noise').value);
      const a_noise = parseFloat(document.getElementById('accel_noise').value);

      // 2. Generate Noisy Sensors (Adding a small bias to the gyro for realism)
      const gyro_meas = omega + (randn() * g_noise) + 0.001; 
      const accel_meas = theta + (randn() * a_noise);

      // 3. Update all 3 WASM Filters
      est_k = K._filter_step(gyro_meas, accel_meas, dt);
      est_c = C._filter_step(gyro_meas, accel_meas, dt);
      est_b = B._filter_step(gyro_meas, accel_meas, dt);

      // 4. PID CONTROL
      const selected = document.getElementById('activeFilter').value;
      let feedback_theta = (selected === 'kalman') ? est_k : (selected === 'comp' ? est_c : est_b);
      
      // Target is 0 (Upright). We use theta and the true omega for the D-term
      const control_torque = -(30.0 * feedback_theta + 2.5 * omega); 
      
      // --- THE PLANT DYNAMICS (With Gravity) ---
      // Torque = J * alpha -> alpha = (ControlTorque + GravityTorque - Damping) / J
      const gravity_torque = m * g * (L/2) * Math.sin(theta);
      const damping_torque = b * omega;
      
      const total_torque = control_torque + gravity_torque - damping_torque;
      const alpha_phys = total_torque / J;

      // Integration
      omega += alpha_phys * dt;
      theta += omega * dt;

      frameCount++;

// Capture data at 60Hz
if (isRecording) {
    missionData.push([
        (frameCount * dt).toFixed(3),
        theta.toFixed(5),
        est_k.toFixed(5),
        est_c.toFixed(5),
        est_b.toFixed(5),
        total_torque.toFixed(5)
    ]);
}

// Throttled Terminal Update (Every 0.5 seconds)
if (frameCount % 30 === 0) {
    log(`T:${(frameCount*dt).toFixed(1)}s | K_Err:${(theta-est_k).toFixed(4)}`);
}
      
      // 5. Draw and Telemetry
      draw();
      updateTelemetry();
      requestAnimationFrame(loop);
    }

    function draw() {
      ctx.clearRect(0, 0, 600, 600);
      ctx.save();
      ctx.translate(300, 400);
      
      // Draw 3 Ghost Pendulums (The Filters)
      drawPendulum(est_k, '#00ff0066', 4); // Kalman
      drawPendulum(est_c, '#00d4ff66', 4); // Comp
      drawPendulum(est_b, '#ff00ff66', 4); // Particle
      
      // Draw 1 Solid Pendulum (The Reality)
      drawPendulum(theta, '#ffffff', 8); 
      
      ctx.restore();
    }

    function drawPendulum(angle, color, width) {
      ctx.save();
      ctx.rotate(angle);
      ctx.beginPath(); ctx.moveTo(0,0); ctx.lineTo(0,-250);
      ctx.strokeStyle = color; ctx.lineWidth = width; ctx.lineCap = 'round'; ctx.stroke();
      ctx.restore();
    }

    function updateTelemetry() {
  const ek = document.getElementById('err-k');
  const ec = document.getElementById('err-c');
  const ep = document.getElementById('err-p');

  // Only update if the UI elements actually exist
  if (ek) ek.innerText = Math.abs(theta - est_k).toFixed(4);
  if (ec) ec.innerText = Math.abs(theta - est_c).toFixed(4);
  if (ep) ep.innerText = Math.abs(theta - est_b).toFixed(4);
}

    function randn() {
      let u = 0, v = 0;
      while(u === 0) u = Math.random(); while(v === 0) v = Math.random();
      return Math.sqrt(-2.0 * Math.log(u)) * Math.cos(2.0 * Math.PI * v);
    }
  </script>
</body>
</html>
